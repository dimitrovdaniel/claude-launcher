name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-13
            rid: osx-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: bash
        run: |
          dotnet publish ClaudeLauncher.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish

      - name: Package
        shell: bash
        run: |
          cd publish
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../ClaudeLauncher-${{ github.ref_name }}-${{ matrix.rid }}.zip .
          else
            zip -r ../ClaudeLauncher-${{ github.ref_name }}-${{ matrix.rid }}.zip .
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeLauncher-${{ github.ref_name }}-${{ matrix.rid }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
